<!DOCTYPE html>
<html>
<head>
    <title>Python Hosting</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial, sans-serif; background:#0f172a; color:white; text-align:center; margin:0; padding:0;">

<div style="margin-top:80px;">
    <h1>🐍 Python Hosting Panel</h1>
    <p>Create your own dynamic link with Python file</p>

    <form method="POST" enctype="multipart/form-data" 
          style="background:#1e293b; padding:20px; border-radius:10px; display:inline-block; margin-top:20px;">

        <label>Website Name:</label><br>
        <input type="text" name="name" placeholder="enter name (hello)" required
               style="padding:10px; margin-top:5px; width:200px;"><br><br>

        <label>Upload .py file:</label><br>
        <input type="file" name="file" accept=".py" required
               style="margin-top:5px;"><br><br>

        <button type="submit"
                style="padding:10px 20px; background:#22c55e; border:none; color:white; border-radius:5px;">
            🚀 Create Link
        </button>
    </form>
</div>

</body>
</html>
